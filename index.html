<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollinations Dream Translator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; }
        input[type="text"] {
            width: 80%;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background-color: #6c5ce7;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #5649c0; }
        #image-container {
            margin-top: 20px;
            min-height: 256px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fafafa;
            border-radius: 10px;
            border: 2px dashed #ddd;
        }
        img {
            max-width: 100%;
            border-radius: 8px;
            display: none; /* Hidden until loaded */
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #6c5ce7;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ Idea Translator</h1>
        <p>Type a thought, and see what the AI "translates" it into.</p>
        
        <input type="text" id="promptInput" placeholder="e.g., A cybernetic cat in Tokyo...">
        <br>
        <button onclick="translateIdea()">Translate to Image</button>

        <div id="image-container">
            <div class="loader" id="loader"></div>
            <img id="resultImage" alt="AI Generated Image">
        </div>
    </div>

    <script>
        function translateIdea() {
            const prompt = document.getElementById('promptInput').value;
            const img = document.getElementById('resultImage');
            const loader = document.getElementById('loader');

            if (!prompt) {
                alert("Please type something first!");
                return;
            }

            // Show loader, hide old image
            loader.style.display = 'block';
            img.style.display = 'none';

            // Add a random seed to ensure it generates a new image every time
            const randomSeed = Math.floor(Math.random() * 1000000);
            
            // Construct the Pollinations.ai URL
            // We encode the prompt to handle spaces and special characters safely
            const imageUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=512&height=512&seed=${randomSeed}&nologo=true`;

            // When the image finishes loading, show it
            img.onload = function() {
                loader.style.display = 'none';
                img.style.display = 'block';
            };

            // Set the source to trigger the generation
            img.src = imageUrl;
        }
    </script>

</body>
</html>
